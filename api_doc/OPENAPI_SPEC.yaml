        Возвращает настройки ассистента (имя, аватар, зелёное описание) для текущего проекта.
        Используется админкой / кабинетом агента для управления брендингом ассистента.
      tags: [AiB2C, Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущие настройки или null, если ещё не заданы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiB2cSettings'

  /pfp/ai-b2c/settings:
    get:
      summary: Получить настройки B2C AI ассистента (агент)
      description: |
        Возвращает настройки ассистента в рамках проекта агента.
        Включая `dynamic_context_text` (для динамического переключения стадий).
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущие настройки или null, если ещё не заданы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiB2cSettings'
    put:
      summary: Обновить настройки B2C AI ассистента (агент)
      description: |
        Обновляет `display_name`, `tagline` и `dynamic_context_text`.
        `avatar_url` контролируется отдельным эндпоинтом `POST /pfp/ai-b2c/avatar-upload`.
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                tagline:
                  type: string
                dynamic_context_text:
                  type: string
      responses:
        '200':
          description: Настройки обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiB2cSettings'
        '201':
          description: Настройки созданы впервые
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiB2cSettings'

  /pfp/ai-b2c-chat/brain-contexts:
    get:
      summary: Список brain-contexts для chat_AI (агент)
      description: |
        Отдельные brain-contexts для потока `POST /my/ai-b2c/chat_AI/stream`.
        Site-flow (`/my/ai-b2c/chat/stream`) эти записи не использует.
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список chat_AI brain-contexts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    project_id: { type: integer, nullable: true }
                    title: { type: string }
                    content: { type: string }
                    is_active: { type: boolean }
                    priority: { type: integer }
                    created_at: { type: string, format: date-time }
                    updated_at: { type: string, format: date-time }
    post:
      summary: Создать chat_AI brain-context с опциональной загрузкой документа
      description: |
        Поддерживает:
        - `application/json` (ручной `content`);
        - `multipart/form-data` с файлом `document`.

        Из файла (`pdf/doc/docx/txt/md/rtf`) извлекается текст и склеивается с `content`.
        Обязателен `title`, плюс минимум одно из полей: `content` или `document`.
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title: { type: string, description: 'Название контекста' }
                content: { type: string, description: 'Текст промпта/инструкции' }
                is_active: { type: boolean, default: true }
                priority: { type: integer, default: 0 }
          multipart/form-data:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  description: Название контекста
                content:
                  type: string
                  description: Текст промпта/инструкции (опционально, если есть document)
                is_active:
                  type: boolean
                  default: true
                priority:
                  type: integer
                  default: 0
                document:
                  type: string
                  format: binary
                  description: Файл для извлечения текста (pdf/doc/docx/txt/md/rtf), до 8MB
      responses:
        '201':
          description: Создано
        '400':
          description: Невалидные параметры, неподдерживаемый файл или ошибка извлечения текста

  /pfp/ai-b2c-chat/brain-contexts/{id}/documents:
    get:
      summary: Список документов для chat_AI brain-context
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: include_inactive
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Список документов
    post:
      summary: Загрузить документ в chat_AI brain-context
      description: |
        Загружает документ, извлекает текст и сохраняет его как отдельный кусок контекста.
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [document]
              properties:
                document:
                  type: string
                  format: binary
                  description: Файл для извлечения текста (pdf/doc/docx/txt/md/rtf), до 8MB
      responses:
        '201':
          description: Документ загружен
        '400':
          description: Ошибка валидации или извлечения текста
        '404':
          description: Brain-context не найден

  /pfp/ai-b2c-chat/brain-contexts/{id}/documents/{docId}:
    get:
      summary: Получить документ chat_AI brain-context
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: docId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Документ и извлечённый текст
        '404':
          description: Документ или brain-context не найден
    delete:
      summary: Удалить документ chat_AI brain-context
      tags: [AiB2C, Agents]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: docId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Удалено
        '404':
          description: Документ или brain-context не найден

  /pfp/ai-b2c/avatar-upload:
    post:
      summary: Загрузка аватара для AI B2C ассистента (агентский ЛК)
      description: |
        Загружает картинку (аватар ассистента) и возвращает URL, который можно сохранить в настройках ассистента.
        Ожидает multipart/form-data с полем **image**.
      tags: [AiB2C, Agents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Файл изображения (PNG/JPEG/WebP), до 5 МБ
      responses:
        '201':
          description: Файл загружен успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Публичный URL загруженного файла
        '400':
          description: Ошибка валидации (нет файла или не картинка)

  /my/ai-b2c/chat:
    post:
      summary: Отправить сообщение ИИ (обычный ответ)
      description: |
        Клиентский B2C-метод. Фронт передает `stage` и `message`.
        Бэкенд собирает контекст (brain + stage + история + данные клиента) и возвращает готовый текст.
      tags: [AiB2C]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage, message]
              properties:
                stage: { type: string, description: 'Ключ этапа (например, start, consulting, PFP1)' }
                message: { type: string, description: 'Сообщение клиента' }
      responses:
        '200':
          description: Успешный ответ ИИ

  /my/ai-b2c/chat/stream:
    post:
      summary: Отправить сообщение ИИ (SSE стрим)
      description: |
        Клиентский B2C-метод со стримингом. Фронт передает `stage` и `message`,
        ответ ИИ приходит по частям в формате text/event-stream.
      tags: [AiB2C]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage, message]
              properties:
                stage: { type: string }
                message: { type: string }
      responses:
        '200':
          description: Streaming response (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                format: binary

  /my/ai-b2c/chat_AI/stream:
    post:
      summary: B2C_AIchat chat_AI flow (SSE стрим, 2 шага)
      description: |
        Отдельный endpoint для chat_AI с независимыми наборами контекстов и истории.
        site-flow (`/my/ai-b2c/chat/stream`) не меняется.
      tags: [AiB2C]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, description: 'Сообщение клиента на входе chat_AI flow' }
      responses:
        '200':
          description: Streaming response (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                format: binary

  /my/ai-b2c/chat/dynamic/stream:
    post:
      summary: B2C_AIchat dynamic flow (SSE стрим, 2 шага)
      description: |
        Новый метод для динамического диалога.
        1) Первое сообщение: финальный ответ генерится на стадии `start` (1-й ИИ не вызывается).
        2) Каждое следующее сообщение:
        - 1-й ИИ по `dynamic_context_text` выбирает команду маршрутизации (`/consulting`, `/startPFP`, `/start`)
        - команда мапится в `stage_key`
        - 2-й ИИ генерит ответ на выбранной стадии с учётом глобальной истории диалога
      tags: [AiB2C]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, description: 'Сообщение клиента на входе dynamic flow' }
      responses:
        '200':
          description: Streaming response (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                format: binary

