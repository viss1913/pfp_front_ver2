openapi: 3.0.0

info:
  title: PFP Service API
  version: 1.0.0
  description: API for managing Products & Portfolios
servers:
  - url: /api
    description: Main API server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    projectKeyAuth:
      type: apiKey
      in: header
      name: x-project-key
      description: Public Project Key for multi-tenancy context
  parameters:
    ProjectKeyHeader:
      name: x-project-key
      in: header
      required: false
      description: Public key to identify the project project context
      schema:
        type: string
        example: pk_default_pfp_2026
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        product_type:
          type: string
          description: |
            **ВАЖНО: На фронтенде это поле должно быть выпадающим списком!**
            Код типа продукта из справочника типов продуктов.
            Получить список доступных типов: GET /api/pfp/product-types
            Значение должно быть одним из кодов (code) из этого списка.
            Для софинансирования ПДС используйте тип "PDS".
        currency:
          type: string
        min_term_months:
          type: integer
        max_term_months:
          type: integer
        min_amount:
          type: number
        max_amount:
          type: number
        yields:
          type: array
          items:
            $ref: '#/components/schemas/ProductYield'
        resolut_pfp_code:
          type: string
          nullable: true
          maxLength: 64
          description: |
            Код продукта PFP в API Резолюта (ответ операции `products`), например `assetShort`, `cashback`.
            Если задан и `project_id` клиента совпадает с `RESOLUT_PROJECT_ID`, при расчёте взвешенной доходности портфеля может вызываться `quote` (см. `resolut_quote_p_type`).
            Для остальных проектов поле игнорируется.
          example: assetShort
        resolut_quote_p_type:
          type: integer
          nullable: true
          enum: [0, 1, 2, 4, 12]
          description: |
            Периодичность взноса для котировки Резолюта: 0 — единовременно, 1 — ежегодно, 2 — раз в полгода, 4 — ежеквартально, 12 — ежемесячно.
            Имплицитная годовая доходность из ответа `quote` в расчётах портфеля сейчас поддерживается для `0`; иначе используется матрица `lines`/`yields`, если заполнена.
    ProductYield:
      type: object
      properties:
        term_from_months:
          type: integer
        term_to_months:
          type: integer
        amount_from:
          type: number
        amount_to:
          type: number
        yield_percent:
          type: number
    ProductCreate:
      type: object
      required:
        - name
        - product_type
        - currency
      description: |
        Схема для создания нового продукта.
        Поле product_type должно быть выбрано из списка доступных типов продуктов,
        полученных через GET /api/pfp/product-types
      properties:
        name:
          type: string
          description: Название продукта
        product_type:
          type: string
          description: |
            **ВАЖНО: Это поле должно быть выпадающим списком на фронтенде!**
            Код типа продукта из справочника типов продуктов.
            Получить список доступных типов: GET /api/pfp/product-types
            Значение должно быть одним из кодов (code) из этого списка.
            Для софинансирования ПДС используйте тип "PDS".
          example: PDS
        currency:
          type: string
          description: Валюта продукта
          example: RUB
        lines:
          type: array
          description: Массив линий доходности продукта
          items:
            $ref: '#/components/schemas/ProductLine'
        resolut_pfp_code:
          type: string
          nullable: true
          maxLength: 64
          description: |
            Опционально: интеграция с Резолют (проект AV, `RESOLUT_PROJECT_ID`). Код из `GET …/resolut/products` (`pfpCode`).
          example: assetShort
        resolut_quote_p_type:
          type: integer
          nullable: true
          enum: [0, 1, 2, 4, 12]
          description: |
            Периодичность для `quote`; для расчёта доходности из котировки в портфеле — задайте `0` или оставьте пустым (дефолт 0 / env `RESOLUT_PORTFOLIO_QUOTE_PTYPE`).
    ProductLine:
      type: object
      description: Линия доходности продукта
      required:
        - min_term_months
        - max_term_months
        - min_amount
        - max_amount
        - yield_percent
      properties:
        min_term_months:
          type: number
          description: Минимальный срок в месяцах (включительно)
        max_term_months:
          type: number
          description: Максимальный срок в месяцах (включительно)
        min_amount:
          type: number
          description: Минимальная сумма (включительно)
        max_amount:
          type: number
          description: Максимальная сумма (включительно)
        yield_percent:
          type: number
          description: Доходность в процентах годовых (%)
    ProductType:
      type: object
      description: Тип продукта
      properties:
        id:
          type: integer
          description: ID типа продукта
        code:
          type: string
          maxLength: 50
          description: Код типа продукта (PDS, IIS, ISZH, etc.)
          example: PDS
        name:
          type: string
          maxLength: 255
          description: Название типа продукта
          example: Программа долгосрочных сбережений
        description:
          type: string
          nullable: true
          description: Описание типа продукта
        is_active:
          type: boolean
          description: Активен ли тип
          default: true
        order_index:
          type: integer
          description: Порядок сортировки
          default: 0
        created_at:
          type: string
          format: date-time
          description: Дата создания
        updated_at:
          type: string
          format: date-time
          description: Дата обновления
    ProductTypeCreate:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
          description: Код типа продукта (уникальный)
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Название типа продукта
        description:
          type: string
          nullable: true
          description: Описание типа продукта
        is_active:
          type: boolean
          default: true
        order_index:
          type: integer
          default: 0
    ProductTypeUpdate:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
          description: Код типа продукта (уникальный)
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Название типа продукта
        description:
          type: string
          nullable: true
          description: Описание типа продукта
        is_active:
          type: boolean
        order_index:
          type: integer
    Portfolio:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        currency:
          type: string
        amount_from:
          type: number
        amount_to:
          type: number
        term_from_months:
          type: integer
        term_to_months:
          type: integer
        classes:
          type: array
          items:
            type: object # simplified
        riskProfiles:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioRiskProfile'
    PortfolioUpdate:
      type: object
      description: |
        Схема для обновления портфеля. Все поля опциональны.
        **Важно:** Поддерживаются оба формата для риск-профилей:
        - `riskProfiles` (camelCase, рекомендуется)
        - `risk_profiles` (snake_case, для обратной совместимости)
      properties:
        name:
          type: string
        currency:
          type: string
        amount_from:
          type: number
        amount_to:
          type: number
        term_from_months:
          type: integer
        term_to_months:
          type: integer
        age_from:
          type: integer
          nullable: true
        age_to:
          type: integer
          nullable: true
        investor_type:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        classes:
          type: array
          items:
            type: integer
          description: Массив ID классов портфеля
        riskProfiles:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioRiskProfile'
          description: Массив риск-профилей (camelCase, рекомендуется)
        risk_profiles:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioRiskProfile'
          description: Массив риск-профилей (snake_case, для обратной совместимости)
    PortfolioRiskProfile:
      type: object
      properties:
        profile_type:
          type: string
          enum: [CONSERVATIVE, BALANCED, AGGRESSIVE]
        potential_yield_percent:
          type: number
        explanation:
          type: string
          nullable: true
          description: >
            Текстовое объяснение для агента, зачем этот риск-профиль и когда его
            выбирать. Используется только на фронтенде ЛК агента для подсказок.
        instruments:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioInstrument'
    PortfolioInstrument:
      type: object
      description: |
        Инструмент портфеля. При GET-запросе может содержать дополнительные поля (id, portfolio_risk_profile_id),
        которые автоматически игнорируются при PUT-запросе.
      properties:
        product_id:
          type: integer
          description: ID продукта (обязательно)
        bucket_type:
          type: string
          enum: [INITIAL_CAPITAL, TOP_UP]
          description: Тип сегмента (INITIAL_CAPITAL - стартовый капитал, TOP_UP - пополнения)
          nullable: true
        share_percent:
          type: number
          description: Доля в процентах (обязательно)
        order_index:
          type: integer
          description: Порядок сортировки (опционально)
          nullable: true
        id:
          type: integer
          description: |
            ID инструмента (только в GET-ответе, игнорируется при PUT).
            Это поле присутствует в ответе API, но не нужно отправлять при обновлении.
          readOnly: true
        portfolio_risk_profile_id:
          type: integer
          description: |
            ID профиля риска (только в GET-ответе, игнорируется при PUT).
            Это поле присутствует в ответе API, но не нужно отправлять при обновлении.
          readOnly: true
    SystemSetting:
      type: object
      description: |
        Системная настройка проекта. Ключи, важные для расчётов:
        - **inflation_rate_year** (number) — годовая инфляция по умолчанию (%). Используется, если не задана матрица.
        - **inflation_rate_matrix** (object) — матрица инфляции по месяцам горизонта; см. схему InflationRateMatrix. Диапазоны создаёт агент при настройке проекта; в системе нет дефолтной матрицы.
        - **investment_expense_growth_annual** (number) — рост расходов на инвестиции (% годовых). В расчётах переводится в месячную долю; если не задан — используется investment_expense_growth_monthly (% в месяц).
        - **investment_expense_growth_monthly** (number) — рост расходов на инвестиции (% в месяц), fallback если не задана годовая.
      properties:
        key:
          type: string
          description: Unique setting key
        value:
          oneOf:
            - type: string
            - type: number
            - type: object
          description: Setting value (type depends on value_type)
        description:
          type: string
          description: Human-readable description
        category:
          type: string
          description: Category (calculation, pension, etc.)
        updated_at:
          type: string
          format: date-time
    InflationRateRange:
      type: object
      required:
        - fromMonth
        - toMonthExcl
        - rateAnnual
      description: Один диапазон месяцев с единой годовой ставкой инфляции
      properties:
        fromMonth:
          type: integer
          minimum: 0
          description: Начало диапазона (месяц от старта, 0-based, включительно)
          example: 0
        toMonthExcl:
          type: integer
          minimum: 0
          description: Конец диапазона (не включая). Например 12 — месяцы 0..11
          example: 12
        rateAnnual:
          type: number
          minimum: 0
          description: Годовая инфляция в % для этого диапазона. В расчётах переводится в месячную по формуле (1 + rateAnnual/100)^(1/12) - 1
          example: 7.5
    InflationRateMatrix:
      type: object
      required:
        - ranges
      description: |
        Матрица инфляции по месяцам горизонта. Создаётся агентом при настройке проекта.
        Для месяца m (0-based) берётся ставка из диапазона, где fromMonth <= m < toMonthExcl.
        Если месяц вне всех диапазонов — используется ставка последнего диапазона (продление).
        Поля rateAnnual везде — годовые проценты.
      properties:
        ranges:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/InflationRateRange'
          description: Диапазоны месяцев и годовая ставка инфляции (%) для каждого
    Tax2ndflBracket:
      type: object
      description: Налоговая ставка 2НДФЛ (прогрессивная шкала налогообложения)
      properties:
        id:
          type: integer
          description: ID налоговой ставки
        income_from:
          type: number
          format: double
          description: Доход в год от (руб.)
          example: 0
        income_to:
          type: number
          format: double
          description: Доход до, включая (руб.)
          example: 5000000
        rate:
          type: number
          format: double
          description: Ставка налога (%)
          example: 13.0
        order_index:
          type: integer
          description: Порядок сортировки
          example: 1
        created_at:
          type: string
          format: date-time
          description: Дата создания
        updated_at:
          type: string
          format: date-time
          description: Дата обновления
    Tax2ndflBracketCreate:
      type: object
      required:
        - income_from
        - income_to
        - rate
      properties:
        income_from:
          type: number
          format: double
          minimum: 0
          description: Доход в год от (руб.)
        income_to:
          type: number
          format: double
          minimum: 0
          description: Доход до, включая (руб.)
        rate:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Ставка налога (%)
        order_index:
          type: integer
          minimum: 0
          description: Порядок сортировки
    Tax2ndflBracketUpdate:
      type: object
      properties:
        income_from:
          type: number
          format: double
          minimum: 0
          description: Доход в год от (руб.)
        income_to:
          type: number
          format: double
          minimum: 0
          description: Доход до, включая (руб.)
        rate:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Ставка налога (%)
        order_index:
          type: integer
          minimum: 0
          description: Порядок сортировки
    Tax2ndflBracketsBulkCreate:
      type: object
      required:
        - brackets
      properties:
        brackets:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Tax2ndflBracketCreate'
          description: Массив налоговых ставок для создания
    PdsCofinSettings:
      type: object
      description: Настройки софинансирования ПДС
      properties:
        id:
          type: integer
          description: ID записи
        max_state_cofin_amount_per_year:
          type: integer
          description: Максимальная сумма господдержки в год (₽)
          example: 36000
        min_contribution_for_support_per_year:
          type: integer
          description: Минимальный годовой взнос для участия в софинансировании (₽)
          example: 2000
        income_basis:
          type: string
          enum: [gross_before_ndfl, net_after_ndfl]
          description: Основа для расчета дохода (gross_before_ndfl - до НДФЛ, net_after_ndfl - после НДФЛ)
          example: gross_before_ndfl
        created_at:
          type: string
          format: date-time
          description: Дата создания
        updated_at:
          type: string
          format: date-time
          description: Дата обновления
    PdsCofinSettingsUpdate:
      type: object
      description: Обновление настроек софинансирования ПДС
      properties:
        max_state_cofin_amount_per_year:
          type: integer
          minimum: 0
          description: Максимальная сумма господдержки в год (₽)
        min_contribution_for_support_per_year:
          type: integer
          minimum: 0
          description: Минимальный годовой взнос для участия в софинансировании (₽)
        income_basis:
          type: string
          enum: [gross_before_ndfl, net_after_ndfl]
          description: Основа для расчета дохода
    PdsCofinIncomeBracket:
      type: object
      description: Диапазон доходов для софинансирования ПДС
      properties:
        id:
          type: integer
          description: ID диапазона
        income_from:
          type: integer
          description: Доход от (₽/мес), включительно
          example: 0
        income_to:
          type: integer
          nullable: true
          description: Доход до (₽/мес), NULL = нет верхней границы
          example: 80000
        ratio_numerator:
          type: integer
          description: Числитель соотношения (обычно 1)
          example: 1
        ratio_denominator:
          type: integer
          description: Знаменатель соотношения (1, 2, 4)
          example: 1
        created_at:
          type: string
          format: date-time
          description: Дата создания
        updated_at:
          type: string
          format: date-time
          description: Дата обновления
    PdsCofinIncomeBracketCreate:
      type: object
      required:
        - income_from
        - ratio_numerator
        - ratio_denominator
      properties:
        income_from:
          type: integer
          minimum: 0
          description: Доход от (₽/мес), включительно
        income_to:
          type: integer
          minimum: 0
          nullable: true
          description: Доход до (₽/мес), NULL = нет верхней границы
        ratio_numerator:
          type: integer
          minimum: 1
          description: Числитель соотношения
        ratio_denominator:
          type: integer
          minimum: 1
          description: Знаменатель соотношения
    PdsCofinIncomeBracketUpdate:
      type: object
      properties:
        income_from:
          type: integer
          minimum: 0
          description: Доход от (₽/мес), включительно
        income_to:
          type: integer
          minimum: 0
          nullable: true
          description: Доход до (₽/мес), NULL = нет верхней границы
        ratio_numerator:
          type: integer
          minimum: 1
          description: Числитель соотношения
        ratio_denominator:
          type: integer
          minimum: 1
          description: Знаменатель соотношения
    PdsCofinCalculationRequest:
      type: object
      required:
        - yearly_contribution
        - avg_monthly_income
      properties:
        yearly_contribution:
          type: integer
          minimum: 0
          description: Годовой взнос (₽)
          example: 50000
        avg_monthly_income:
          type: integer
          minimum: 0
          description: Среднемесячный доход ДО НДФЛ (₽/мес)
          example: 100000
    PdsCofinCalculationResponse:
      type: object
      properties:
        bracket_id:
          type: integer
          nullable: true
          description: ID найденного диапазона доходов
        cofin_coef:
          type: number
          format: double
          description: Коэффициент софинансирования (k = numerator/denominator)
          example: 1.0
        state_cofin_amount:
          type: integer
          description: Фактическая сумма господдержки с учетом лимита (₽)
          example: 36000
        yearly_contribution:
          type: integer
          description: Годовой взнос (₽)
        avg_monthly_income:
          type: integer
          description: Среднемесячный доход ДО НДФЛ (₽/мес)
        message:
          type: string
          description: Сообщение (если взнос меньше минимального)
    PassiveIncomeYieldLine:
      type: object
      description: Линия доходности для пассивного дохода
      required:
        - min_term_months
        - max_term_months
        - min_amount
        - max_amount
        - yield_percent
      properties:
        min_term_months:
          type: number
          format: double
          minimum: 0
          description: Минимальный срок в месяцах (включительно)
          example: 0
        max_term_months:
          type: number
          format: double
          minimum: 0
          description: Максимальный срок в месяцах (включительно)
          example: 60
        min_amount:
          type: number
          format: double
          minimum: 0
          description: Минимальная сумма (₽), включительно
          example: 0
        max_amount:
          type: number
          format: double
          minimum: 0
          description: Максимальная сумма (₽), включительно
          example: 1000000000000
        yield_percent:
          type: number
          format: double
          minimum: 0
          description: Доходность в процентах годовых (%)
          example: 14.0
    PassiveIncomeYieldSettings:
      type: object
      description: Настройки линий доходности для пассивного дохода
      properties:
        lines:
          type: array
          description: Массив линий доходности
          items:
            $ref: '#/components/schemas/PassiveIncomeYieldLine'
        updated_at:
          type: string
          format: date-time
          description: Дата последнего обновления
    PassiveIncomeYieldUpdate:
      type: object
      description: Обновление линий доходности для пассивного дохода
      required:
        - lines
      properties:
        lines:
          type: array
          minItems: 1
          description: Массив линий доходности
          items:
            $ref: '#/components/schemas/PassiveIncomeYieldLine'
    AiAssistant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        context_template:
          type: string
        model:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AiAssistantCreate:
      type: object
      required:
        - name
        - slug
        - context_template
      properties:
        name:
          type: string
        slug:
          type: string
        context_template:
          type: string
        model:
          type: string
        is_active:
          type: boolean
    AiAssistantUpdate:
      type: object
      properties:
        name:
          type: string
        context_template:
          type: string
        model:
          type: string
        is_active:
          type: boolean

    AiB2cSettings:
      type: object
      description: Настройки внешнего вида AI B2C ассистента на уровне проекта
      properties:
        id: { type: integer }
        project_id: { type: integer }
        display_name: { type: string, description: 'Имя ассистента, отображаемое на фронте (например, Виктория)' }
        avatar_url: { type: string, nullable: true, description: 'URL аватарки ассистента' }
        tagline: { type: string, nullable: true, description: 'Короткое зелёное зелёное описание/подпись' }
        dynamic_context_text: { type: string, nullable: true, description: 'Динамический контекст для 1-го шага B2C AIchat (определение команды /consulting, /startPFP, /start)' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    
    Agent:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
        email:
          type: string
        phone:
          type: string
        website_url:
          type: string
        telegram_bot:
          type: string
        telegram_channel:
          type: string
        telegram_channel_id:
          type: string
        is_active:
          type: boolean
        region:
          type: string
        city:
          type: string
        position_title:
          type: string
        specialization:
          type: string
        experience_years:
          type: integer
        passport_series:
          type: string
          description: Серия паспорта
        passport_number:
          type: string
          description: Номер паспорта
        birth_date:
          type: string
          format: date
          description: Дата рождения (YYYY-MM-DD)
        gender:
          type: string
          enum: [male, female]
          description: Пол
        signature_image_url:
          type: string
          format: uri
          description: Публичный URL изображения подписи (после загрузки через POST .../signature-upload или вручную)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentCreate:
      type: object
      required:
        - first_name
        - last_name
        - email
        - password
      properties:
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        telegram_bot:
          type: string
        telegram_channel:
          type: string
        telegram_channel_id:
          type: string
        is_active:
          type: boolean
          default: true
        region:
          type: string
        city:
          type: string
        position_title:
          type: string
        specialization:
          type: string
        experience_years:
          type: integer
        passport_series:
          type: string
        passport_number:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        signature_image_url:
          type: string
          format: uri

    AgentUpdate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        telegram_bot:
          type: string
        telegram_channel:
          type: string
        telegram_channel_id:
          type: string
        is_active:
          type: boolean
        region:
          type: string
        city:
          type: string
        position_title:
          type: string
        specialization:
          type: string
        experience_years:
          type: integer
        passport_series:
          type: string
        passport_number:
          type: string
        birth_date:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        signature_image_url:
          type: string
          format: uri

    Project:
      type: object
      description: Проект (мультитенантность). Управление — только super_admin.
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        public_key: { type: string }
        status: { type: string, enum: [active, suspended] }
        settings:
          $ref: '#/components/schemas/ProjectSettings'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectSettings:
      type: object
      description: Настройки проекта (при PUT мержатся с существующими)
      properties:
        agents_see_all_clients:
          type: boolean
          description: |
            true — все агенты проекта видят всех клиентов с пометкой (B2C / email агента).
            false или не задано — каждый агент видит только своих клиентов.
        client_visibility:
          type: string
          enum: [all, own]
          description: 'all = все видят всех, own = только своих (альтернатива agents_see_all_clients)'

    ProjectUpdate:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [active, suspended] }
        settings: { $ref: '#/components/schemas/ProjectSettings' }

    # Home Owners Insurance
    HomeOwnersProduct:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
          nullable: true
          description: "ID проекта; null — продукт общий для всех проектов"
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        rate_constructive:
          type: number
        rate_finish:
          type: number
        rate_property:
          type: number
        rate_civil:
          type: number
    
    HomeOwnersTariff:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        parameter_name:
          type: string
          description: "Напр. object_type, wall_material, security"
        parameter_value:
          type: string
          description: "Напр. apartment, wood, alarm"
        coefficient:
          type: number
        label:
          type: string
          description: "Человекочитаемое название для фронтенда"
        coefficient_type:
          type: string
          enum: [base, multiplier]
    
    HomeOwnersCalculationRequest:
      type: object
      required:
        - product_id
        - object_params
        - limits
      properties:
        product_id:
          type: integer
        client_id:
          type: integer
          nullable: true
        object_params:
          type: object
          description: "Набор параметров объекта: { object_type: 'apartment', wall_material: 'wood', ... }"
        limits:
          type: object
          required:
            - property
          properties:
            constructive:
              type: number
            finish:
              type: number
            property:
              type: number
            civil:
              type: number
    
    HomeOwnersCalculationResponse:
      type: object
      properties:
        total_premium:
          type: number
        total_limit:
          type: number
        limits:
          type: object
          properties:
            constructive:
              type: number
            finish:
              type: number
            property:
              type: number
            civil:
              type: number
        currency:
          type: string
        calculation_steps:
          type: array
          items:
            type: object
            properties:
              parameter:
                type: string
              value:
                type: string
              coefficient:
                type: number
              premium_after:
                type: number

    # Admin PFP calculations
    PfpCalculationItem:
      type: object
      properties:
        pfp_id:
          type: integer
          format: int64
        client_fio:
          type: string
        agent_fio:
          type: string
        agent_email:
          type: string
        status:
          type: string
        has_calculation:
          type: boolean
        created_at:
          type: string
          format: date-time
    PfpCalculationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PfpCalculationItem'
        pagination:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: Authentication
  - name: Products
  - name: Portfolios
  - name: Clients
  - name: AiAssistants
    description: Management of AI Assistants (Admin only)
  - name: AiB2C
    description: Настройки и контексты AI B2C (админка / проекты)
  - name: Agents
    description: Management of Agents (Consultants)
  - name: HomeOwnersInsurance
    description: Insurance for Home Owners and Civil Liability
  - name: Admin
    description: All administrative and management endpoints


paths:
  /admin/pfp/calculations:
    get:
      summary: Get all PFP calculations/states (Admin only)
      tags:
        - Admin
      parameters:
        - name: limit
          in: query
          description: Rows per page
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
        - name: order
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          description: Search by client/agent name or email
          schema:
            type: string
      responses:
        '200':
          description: List of PFP calculations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PfpCalculationList'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /auth/login:
    post:
      summary: Login and get JWT token
      tags:
        - Authentication
      security: []  # No auth required for login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      name:
                        type: string
                      role:
                        type: string
                      agentId:
                        type: integer
        '401':
          description: Invalid credentials

  /auth/register:
    post:
      summary: Register new agent user
      tags:
        - Authentication
      security: []  # No auth required for registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
                - agentId
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 6
                name:
                  type: string
                agentId:
                  type: integer
      responses:
        '201':
          description: User created
        '400':
          description: User already exists

  /auth/me:
    get:
      summary: Get current user info
      tags:
        - Authentication
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  email:
                    type: string
                  role:
                    type: string
                  agentId:
                    type: integer

  # ==================== Admin: Projects (Super Admin) ====================
  /admin/projects:
    get:
      summary: Список всех проектов
      description: Только для роли super_admin.
      tags: [Admin, Projects]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [active, suspended] }
      responses:
        '200':
          description: Список проектов (у каждого settings — объект)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Project' }
    post:
      summary: Создать проект
      tags: [Admin, Projects]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                slug: { type: string }
                settings: { $ref: '#/components/schemas/ProjectSettings' }
      responses:
        '201':
          description: Проект создан
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }

  /admin/projects/{id}:
    get:
      summary: Получить проект по ID
      tags: [Admin, Projects]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Проект (settings — объект)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '404':
          description: Проект не найден
    put:
      summary: Обновить проект
      description: |
        Настройки (settings) мержатся с существующими: можно передать только нужные ключи
        (например только agents_see_all_clients для видимости клиентов агентам).
      tags: [Admin, Projects]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectUpdate' }
      responses:
        '200':
          description: Проект обновлён
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        '404':
          description: Проект не найден

  /pfp/products:
    get:
      summary: List products
      parameters:
        - in: query
          name: includeDefaults
          schema:
            type: boolean
        - in: query
          name: product_type
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create product
      description: |
        Создает новый продукт. 
        **Важно для фронтенда:** Поле `product_type` должно быть выпадающим списком,
        заполняемым из GET /api/pfp/product-types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Validation error (например, неверный product_type)
          
  /pfp/products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    put:
      summary: Update product
      description: |
        Обновляет существующий продукт.
        **Важно для фронтенда:** Поле `product_type` должно быть выпадающим списком,
        заполняемым из GET /api/pfp/product-types
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Validation error (например, неверный product_type)
        '404':
          description: Product not found
    delete:
      summary: Delete product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
          
  /pfp/products/{id}/clone:
    post:
      summary: Clone default product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Cloned

  /pfp/product-types:
    get:
      summary: Получить все типы продуктов
      tags:
        - Products
      description: Возвращает список всех типов продуктов для выпадающего списка на фронтенде
      parameters:
        - in: query
          name: is_active
          schema:
            type: boolean
          description: Фильтр по активности (true - только активные, false - все)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductType'
    post:
      summary: Создать новый тип продукта (admin only)
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductTypeCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductType'
        '400':
          description: Validation error or code already exists
        '403':
          description: Forbidden (admin only)

  /pfp/product-types/{id}:
    get:
      summary: Получить тип продукта по ID
      tags:
        - Products
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductType'
        '404':
          description: Product type not found
    put:
      summary: Обновить тип продукта (admin only)
      tags:
        - Products
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductTypeUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductType'
        '400':
          description: Validation error or code already exists
        '403':
          description: Forbidden (admin only)
        '404':
          description: Product type not found
    delete:
      summary: Удалить тип продукта (admin only)
      tags:
        - Products
      description: Удаляет тип продукта. Нельзя удалить тип, который используется в продуктах.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '400':
          description: Cannot delete - type is used by products
        '403':
          description: Forbidden (admin only)
        '404':
          description: Product type not found

  /pfp/portfolios:
    get:
      summary: List portfolios
      parameters:
        - in: query
          name: amount_from
          schema:
            type: number
      responses:
        '200':
          description: OK
    post:
      summary: Create portfolio
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Portfolio'
      responses:
        '201':
          description: Created
          
  /pfp/portfolios/{id}:
    get:
      summary: Get portfolio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    put:
      summary: Update portfolio
      description: |
        Обновляет существующий портфель. Все поля опциональны (частичное обновление).
        
        **Важно для фронтенда:**
        - Поддерживаются оба формата для риск-профилей:
          - `riskProfiles` (camelCase, рекомендуется) - соответствует формату ответа API
          - `risk_profiles` (snake_case) - для обратной совместимости
        - Можно отправлять данные как есть из GET-ответа: лишние поля (id, portfolio_risk_profile_id) 
          в инструментах автоматически отфильтруются бэкендом
        - Формат инструментов: массив `instruments` с полями `product_id`, `bucket_type`, `share_percent`, `order_index`
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortfolioUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'
        '400':
          description: Validation error
        '403':
          description: Access denied
        '404':
          description: Portfolio not found
    delete:
      summary: Delete portfolio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
          
  /pfp/portfolios/{id}/clone:
    post:
      summary: Clone default portfolio
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Cloned

  /pfp/settings:
    get:
      summary: List all system settings
      tags:
        - Settings
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category (calculation, pension, etc.)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemSetting'
    post:
      summary: Create new setting (admin only)
      tags:
        - Settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - value
              properties:
                key:
                  type: string
                value:
                  oneOf:
                    - type: string
                    - type: number
                    - type: object
                description:
                  type: string
                category:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
        '403':
          description: Forbidden (admin only)

  /pfp/settings/{key}:
    get:
      summary: Get setting by key
      description: |
        Ключи, связанные с инфляцией:
        - **inflation_rate_matrix** — объект с полем ranges (массив { fromMonth, toMonthExcl, rateAnnual }).
          Годовая ставка в %; для расчётов бэкенд переводит в месячную по формуле (1 + rateAnnual/100)^(1/12) - 1.
        - **inflation_rate_year** — число, одна годовая инфляция % (используется, если матрица не задана).
        - **investment_expense_growth_annual** — число, рост расходов на инвестиции в % годовых; в расчётах переводится в месячную.
        - **investment_expense_growth_monthly** — число, рост расходов на инвестиции в % в месяц (fallback).
      tags:
        - Settings
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: Ключ настройки (напр. inflation_rate_matrix, inflation_rate_year)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
        '404':
          description: Setting not found
    put:
      summary: Update setting value (admin only)
      description: |
        Для ключа **inflation_rate_matrix** передайте в value объект по схеме InflationRateMatrix
        (ranges — массив диапазонов с fromMonth, toMonthExcl, rateAnnual в % годовых).
        Для ключа **inflation_rate_year** — число (одна годовая ставка %, fallback если матрицы нет).
        Для ключа **investment_expense_growth_annual** — число (рост расходов на инвестиции в % годовых); в расчётах переводится в месячную. Если не задан — используется investment_expense_growth_monthly (% в месяц).
      tags:
        - Settings
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: Ключ настройки (напр. inflation_rate_matrix, inflation_rate_year)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - value
              properties:
                value:
                  oneOf:
                    - type: string
                    - type: number
                    - type: object
            examples:
              inflation_matrix:
                summary: Матрица инфляции по месяцам
                value:
                  value:
                    ranges:
                      - fromMonth: 0
                        toMonthExcl: 12
                        rateAnnual: 7.5
                      - fromMonth: 12
                        toMonthExcl: 24
                        rateAnnual: 6.7
                      - fromMonth: 24
                        toMonthExcl: 48
                        rateAnnual: 6.0
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
        '403':
          description: Forbidden (admin only)
        '404':
          description: Setting not found
    delete:
      summary: Delete setting (admin only)
      tags:
        - Settings
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '403':
          description: Forbidden (admin only)
        '404':
          description: Setting not found

