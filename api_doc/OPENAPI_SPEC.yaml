  # ==================== Agent: Clients (B2C/CRM hub) ====================
  /pfp/clients:
    get:
      summary: Список клиентов агента (или всех клиентов проекта)
      description: |
        Для ролей agent/admin/super_admin. Поведение зависит от настроек проекта (settings.agents_see_all_clients):
        - Если в проекте включено «все агенты видят всех» — возвращаются все клиенты проекта, у каждого есть owner_label (B2C / email агента).
        - Иначе — только клиенты текущего агента (по agent_id из токена).
        Пагинация: по умолчанию limit=50. Передай limit=all или limit=0, чтобы получить всех без пагинации.
      tags: [Agents, Clients]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
          description: '50 по умолчанию. limit=0 или limit=all — вернуть всех клиентов'
        - in: query
          name: sort
          schema: { type: string, default: created_at }
        - in: query
          name: order
          schema: { type: string, enum: [asc, desc], default: desc }
        - in: query
          name: search
          schema: { type: string }
          description: Поиск по имени, фамилии, email, телефону, external_uuid
        - in: query
          name: include_chat_ai
          schema: { type: string, enum: ['0', '1', 'true', 'false'], default: '1' }
          description: |
            Подмешать истории B2C-чатов в каждый элемент: `chat_ai_messages` (endpoint `chat_AI/stream`) и
            `b2c_site_chat_messages` (обычный `chat/stream`, таблица `ai_b2c_chat_messages`).
            Передай `0` или `false`, чтобы не грузить диалоги (легче ответ).
        - in: query
          name: chat_ai_limit
          schema: { type: integer, default: 200, maximum: 500 }
          description: |
            Сколько последних сообщений на клиента **в каждой** из двух историй в списке (по умолчанию 200, макс. 500).
            Для карточки `GET /client/:id` по умолчанию 500 на канал, макс. 2000.
      responses:
        '200':
          description: Список клиентов с пагинацией
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: Клиент (упрощённый расчёт/профиль). При режиме «все видят всех» добавлено поле owner_label.
                      properties:
                        id: { type: integer }
                        owner_label:
                          type: string
                          description: 'Только если в проекте agents_see_all_clients. Значение: B2C | email агента | ФИО | Агент #id'
                        chat_ai_messages:
                          type: array
                          description: История chat_AI (пустой массив если диалога не было или include_chat_ai=0)
                          items:
                            type: object
                            properties:
                              id: { type: integer }
                              stage_key: { type: string }
                              role: { type: string, enum: [user, assistant] }
                              content: { type: string }
                              created_at: { type: string, format: date-time }
                        b2c_site_chat_messages:
                          type: array
                          description: История обычного B2C чата на сайте (`chat/stream`)
                          items:
                            type: object
                            properties:
                              id: { type: integer }
                              stage_key: { type: string }
                              role: { type: string, enum: [user, assistant] }
                              content: { type: string }
                              created_at: { type: string, format: date-time }
                        constructor_site_chat_messages:
                          type: array
                          description: Чат конструктора (`POST /pfp/constructor/site-chat/stream`, `constructor_logs`)
                          items:
                            type: object
                            properties:
                              id: { type: integer }
                              stage_key: { type: string }
                              role: { type: string, enum: [user, assistant] }
                              content: { type: string }
                              created_at: { type: string, format: date-time }
                        # остальные поля клиента (first_name, goals_summary, и т.д.)
                  pagination:
                    type: object
                    properties:
                      total: { type: integer }
                      page: { type: integer }
                      limit: { type: integer }
                      totalPages: { type: integer }
        '400':
          description: Agent ID not found in token

